AWSTemplateFormatVersion: "2010-09-09"
Description: Aurora Care AI minimal AWS stack for a low-cost / Free Tier academic demo.

Parameters:
  ProjectName:
    Type: String
    Default: aurora-care-ai
    AllowedPattern: "^[a-z0-9-]+$"
    Description: Lowercase project name used in resource names.
  AlertEmail:
    Type: String
    Default: ""
    Description: Optional email address for SNS alerts. Leave blank to skip email subscription.
  RetentionDays:
    Type: Number
    Default: 30
    MinValue: 1
    MaxValue: 365
    Description: Days before S3 reports and DynamoDB index records expire.

Conditions:
  HasAlertEmail: !Not [!Equals [!Ref AlertEmail, ""]]

Resources:
  ReportBucket:
    Type: AWS::S3::Bucket
    DependsOn: ReportIndexerInvokePermission
    Properties:
      BucketName: !Sub "${ProjectName}-${AWS::AccountId}-${AWS::Region}-reports"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: expire-reports
            Status: Enabled
            ExpirationInDays: !Ref RetentionDays
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: s3:ObjectCreated:*
            Function: !GetAtt ReportIndexerFunction.Arn
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: results/

  ReportBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ReportBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource:
              - !GetAtt ReportBucket.Arn
              - !Sub "${ReportBucket.Arn}/*"
            Condition:
              Bool:
                aws:SecureTransport: false

  ReportsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ProjectName}-reports"
      BillingMode: PROVISIONED
      ProvisionedThroughput:
        ReadCapacityUnits: 1
        WriteCapacityUnits: 1
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      SSESpecification:
        SSEEnabled: true
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${ProjectName}-alerts"

  AlertEmailSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasAlertEmail
    Properties:
      Protocol: email
      Endpoint: !Ref AlertEmail
      TopicArn: !Ref AlertTopic

  ReportIndexerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-report-indexer-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: report-indexer-policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:${AWS::Partition}:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${ProjectName}-report-indexer:*"
              - Effect: Allow
                Action: s3:GetObject
                Resource: !Sub "arn:${AWS::Partition}:s3:::${ProjectName}-${AWS::AccountId}-${AWS::Region}-reports/results/*"
              - Effect: Allow
                Action: dynamodb:PutItem
                Resource: !GetAtt ReportsTable.Arn
              - Effect: Allow
                Action: sns:Publish
                Resource: !Ref AlertTopic

  ReportIndexerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${ProjectName}-report-indexer"
      RetentionInDays: 7

  ReportIndexerFunction:
    Type: AWS::Lambda::Function
    DependsOn: ReportIndexerLogGroup
    Properties:
      FunctionName: !Sub "${ProjectName}-report-indexer"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt ReportIndexerRole.Arn
      Timeout: 10
      MemorySize: 128
      Environment:
        Variables:
          TABLE_NAME: !Ref ReportsTable
          TOPIC_ARN: !Ref AlertTopic
          RETENTION_DAYS: !Ref RetentionDays
      Code:
        ZipFile: |
          import json
          import os
          import time
          import urllib.parse

          import boto3

          ddb = boto3.resource("dynamodb")
          s3 = boto3.client("s3")
          sns = boto3.client("sns")

          TABLE_NAME = os.environ["TABLE_NAME"]
          TOPIC_ARN = os.environ["TOPIC_ARN"]
          RETENTION_DAYS = int(os.environ.get("RETENTION_DAYS", "30"))
          ALERT_LEVELS = {"high", "critical", "urgent", "urgente"}

          def _risk_level(report):
              level = str(report.get("level") or "").lower()
              priority = report.get("priority") or {}
              risk_level = str(priority.get("riskLevel") or "").lower()
              return risk_level or level or "unknown"

          def handler(event, context):
              table = ddb.Table(TABLE_NAME)
              indexed = []
              for record in event.get("Records", []):
                  bucket = record["s3"]["bucket"]["name"]
                  key = urllib.parse.unquote_plus(record["s3"]["object"]["key"])
                  obj = s3.get_object(Bucket=bucket, Key=key)
                  payload = json.loads(obj["Body"].read().decode("utf-8"))

                  report = payload.get("report", payload)
                  patient_id = str(payload.get("patient_id") or report.get("patient_id") or "unknown")
                  timestamp = str(payload.get("timestamp_utc") or int(time.time()))
                  level = _risk_level(report)
                  score = str(report.get("multimodal_score_0_1", report.get("score", 0)))
                  ttl = int(time.time()) + RETENTION_DAYS * 86400

                  item = {
                      "pk": f"PATIENT#{patient_id}",
                      "sk": f"TS#{timestamp}",
                      "patient_id": patient_id,
                      "level": level,
                      "score": score,
                      "s3_bucket": bucket,
                      "s3_key": key,
                      "ttl": ttl,
                  }
                  table.put_item(Item=item)

                  if level in ALERT_LEVELS:
                      sns.publish(
                          TopicArn=TOPIC_ARN,
                          Subject=f"Aurora Care AI: {level.upper()}",
                          Message=json.dumps(item, ensure_ascii=False),
                      )
                  indexed.append({"bucket": bucket, "key": key, "level": level})
              return {"indexed": indexed}

  ReportIndexerInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt ReportIndexerFunction.Arn
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceAccount: !Ref AWS::AccountId
      SourceArn: !Sub "arn:${AWS::Partition}:s3:::${ProjectName}-${AWS::AccountId}-${AWS::Region}-reports"

  PublisherManagedPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub "${ProjectName}-publisher-s3-only"
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - s3:PutObject
            Resource: !Sub "${ReportBucket.Arn}/results/*"
          - Effect: Allow
            Action:
              - s3:GetBucketLocation
            Resource: !GetAtt ReportBucket.Arn

Outputs:
  ReportBucketName:
    Description: S3 bucket used by the local publisher script.
    Value: !Ref ReportBucket
  ReportsTableName:
    Description: DynamoDB report index table.
    Value: !Ref ReportsTable
  AlertTopicArn:
    Description: SNS topic for high-risk alert emails.
    Value: !Ref AlertTopic
  PublisherPolicyArn:
    Description: Attach this policy to a demo IAM user if local AWS keys are required.
    Value: !Ref PublisherManagedPolicy
