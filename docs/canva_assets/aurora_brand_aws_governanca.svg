<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-label="Governanca AWS Aurora Care AI na identidade visual Aurora">
  <defs>
    <style>
      .canvas{fill:#F4F1E8}.surface{fill:#F8F6EF}.raised{fill:#FFFCF4}.coffee{fill:#1E1D1A}.coffee2{fill:#26241F}.red{fill:#DB4842}.red2{fill:#BB3435}.tint{fill:#F4D8D6}.rule{stroke:#E3DED3;stroke-width:2}.line{stroke:#E3DED3;stroke-width:2}
      .label{font-family:"Aptos Mono","IBM Plex Mono",Consolas,monospace;font-size:15px;font-weight:700;letter-spacing:3px;fill:#5C564B}
      .label-light{font-family:"Aptos Mono","IBM Plex Mono",Consolas,monospace;font-size:15px;font-weight:700;letter-spacing:3px;fill:#A29B8C}
      .title{font-family:Georgia,"Times New Roman",serif;font-size:58px;font-weight:700;fill:#1A1814}
      .subtitle{font-family:Aptos,Arial,sans-serif;font-size:23px;fill:#5C564B}
      .h{font-family:Georgia,"Times New Roman",serif;font-size:30px;font-weight:700;fill:#1A1814}
      .body{font-family:Aptos,Arial,sans-serif;font-size:20px;fill:#5C564B}
      .strong{font-family:Aptos,Arial,sans-serif;font-size:20px;font-weight:700;fill:#1A1814}
      .small{font-family:Aptos,Arial,sans-serif;font-size:16px;fill:#5C564B}
      .small-light{font-family:Aptos,Arial,sans-serif;font-size:17px;fill:#ECE7D9}
    </style>
  </defs>
  <rect class="canvas" width="1920" height="1080"/>
  <rect class="red" width="1920" height="14"/>
  <text class="label" x="96" y="102">08 · SEGURANCA E GOVERNANCA</text>
  <text class="title" x="96" y="188">Privacidade, custo e retencao entram como arquitetura</text>
  <text class="subtitle" x="96" y="236">A AWS recebe somente o resultado pseudonimizado; a midia sensivel permanece fora da nuvem.</text>

  <rect class="raised rule" x="96" y="315" width="1728" height="456"/>
  <text class="label" x="138" y="370">DIMENSAO</text>
  <text class="label" x="455" y="370">CONTROLE APLICADO</text>
  <text class="label" x="915" y="370">POR QUE IMPORTA</text>
  <line class="line" x1="138" y1="404" x2="1782" y2="404"/>

  <circle class="red" cx="160" cy="452" r="9"/>
  <text class="strong" x="185" y="459">Custo</text>
  <text class="strong" x="455" y="459">Budget de seguranca</text>
  <text class="body" x="915" y="459">Alerta antes de consumo relevante do Free Tier.</text>
  <line class="line" x1="138" y1="492" x2="1782" y2="492"/>

  <circle class="red" cx="160" cy="540" r="9"/>
  <text class="strong" x="185" y="547">Amazon S3</text>
  <text class="strong" x="455" y="547">Block Public Access + SSE-S3</text>
  <text class="body" x="915" y="547">Relatorios privados por padrao e criptografia server-side.</text>
  <line class="line" x1="138" y1="580" x2="1782" y2="580"/>

  <circle class="coffee" cx="160" cy="628" r="9"/>
  <text class="strong" x="185" y="635">Retencao</text>
  <text class="strong" x="455" y="635">Lifecycle 30 dias + TTL</text>
  <text class="body" x="915" y="635">Reports e indice expiram por politica de permanencia minima.</text>
  <line class="line" x1="138" y1="668" x2="1782" y2="668"/>

  <circle class="red2" cx="160" cy="716" r="9"/>
  <text class="strong" x="185" y="723">Auditoria</text>
  <text class="strong" x="455" y="723">CloudWatch / CloudTrail</text>
  <text class="body" x="915" y="723">Execucoes, eventos e diagnosticos ficam rastreaveis.</text>

  <rect class="coffee" x="96" y="835" width="540" height="132"/>
  <rect class="red" x="96" y="835" width="540" height="10"/>
  <text class="label-light" x="132" y="883">LGPD NO DESENHO</text>
  <text class="small-light" x="132" y="925">Sem video, audio ou imagem brutos persistidos na AWS.</text>

  <rect class="surface rule" x="690" y="835" width="540" height="132"/>
  <rect class="coffee" x="690" y="835" width="540" height="10"/>
  <text class="h" x="726" y="890">Operacao controlada</text>
  <text class="small" x="726" y="926">Budget, logs e alarmes reduzem risco operacional.</text>

  <rect class="surface rule" x="1284" y="835" width="540" height="132"/>
  <rect class="red2" x="1284" y="835" width="540" height="10"/>
  <text class="h" x="1320" y="890">Auditoria reproduzivel</text>
  <text class="small" x="1320" y="926">CloudFormation descreve a stack e facilita revisao futura.</text>
</svg>
