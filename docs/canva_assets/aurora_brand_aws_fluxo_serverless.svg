<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-label="Fluxo serverless AWS Aurora Care AI na identidade visual Aurora">
  <defs>
    <marker id="arrow" markerWidth="20" markerHeight="20" refX="18" refY="10" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0 0 L20 10 L0 20 Z" fill="#DB4842"/>
    </marker>
    <style>
      .canvas{fill:#F4F1E8}.surface{fill:#F8F6EF}.raised{fill:#FFFCF4}.coffee{fill:#1E1D1A}.coffee2{fill:#26241F}.red{fill:#DB4842}.red2{fill:#BB3435}.tint{fill:#F4D8D6}.rule{stroke:#E3DED3;stroke-width:2}
      .label{font-family:"Aptos Mono","IBM Plex Mono",Consolas,monospace;font-size:15px;font-weight:700;letter-spacing:3px;fill:#5C564B}
      .label-light{font-family:"Aptos Mono","IBM Plex Mono",Consolas,monospace;font-size:15px;font-weight:700;letter-spacing:3px;fill:#A29B8C}
      .title{font-family:Georgia,"Times New Roman",serif;font-size:60px;font-weight:700;fill:#1A1814}
      .h{font-family:Georgia,"Times New Roman",serif;font-size:31px;font-weight:700;fill:#1A1814}
      .body{font-family:Aptos,Arial,sans-serif;font-size:21px;fill:#5C564B}
      .body-light{font-family:Aptos,Arial,sans-serif;font-size:23px;fill:#ECE7D9}
      .mono{font-family:"Aptos Mono",Consolas,monospace;font-size:14px;font-weight:700;letter-spacing:2px;fill:#8B867B}
      .arrow{stroke:#DB4842;stroke-width:5;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="canvas" width="1920" height="1080"/>
  <rect class="red" width="1920" height="14"/>
  <text class="label" x="96" y="106">04 · FLUXO SERVERLESS VALIDADO</text>
  <text class="title" x="96" y="192">S3 aciona Lambda e torna o RiskReport consultavel</text>

  <rect class="raised rule" x="110" y="400" width="278" height="178"/>
  <rect class="red" x="110" y="400" width="278" height="10"/>
  <text class="h" x="142" y="466">RiskReport JSON</text>
  <text class="body" x="142" y="514">gerado pelo pipeline</text>
  <text class="body" x="142" y="544">multimodal local</text>

  <rect class="raised rule" x="500" y="400" width="278" height="178"/>
  <rect class="red" x="500" y="400" width="278" height="10"/>
  <text class="h" x="532" y="466">S3 privado</text>
  <text class="body" x="532" y="514">results/demo-001/</text>
  <text class="body" x="532" y="544">SSE-S3 + bloqueio publico</text>

  <rect class="raised rule" x="890" y="400" width="278" height="178"/>
  <rect class="red2" x="890" y="400" width="278" height="10"/>
  <text class="h" x="922" y="466">Lambda</text>
  <text class="body" x="922" y="514">report-indexer</text>
  <text class="body" x="922" y="544">parse JSON + metadados</text>

  <rect class="raised rule" x="1280" y="285" width="278" height="178"/>
  <rect class="coffee" x="1280" y="285" width="278" height="10"/>
  <text class="h" x="1312" y="351">DynamoDB</text>
  <text class="body" x="1312" y="399">pk/sk + score + s3_key</text>
  <text class="body" x="1312" y="429">TTL para retencao</text>

  <rect class="raised rule" x="1280" y="535" width="278" height="178"/>
  <rect class="tint" x="1280" y="535" width="278" height="10"/>
  <text class="h" x="1312" y="601">CloudWatch</text>
  <text class="body" x="1312" y="649">START / END / REPORT</text>
  <text class="body" x="1312" y="679">metricas de execucao</text>

  <path class="arrow" d="M388 489 L500 489"/>
  <path class="arrow" d="M778 489 L890 489"/>
  <path class="arrow" d="M1168 458 L1280 374"/>
  <path class="arrow" d="M1168 520 L1280 624"/>
  <text class="mono" x="414" y="430">UPLOAD</text>
  <text class="mono" x="792" y="430">S3:ObjectCreated</text>
  <text class="mono" x="1198" y="356">PutItem</text>
  <text class="mono" x="1198" y="648">Logs</text>

  <rect class="coffee" x="110" y="805" width="1448" height="112"/>
  <rect class="red" x="110" y="805" width="10" height="112"/>
  <text class="body-light" x="156" y="866">Evidencia observada: objeto no S3, item no DynamoDB e invocacoes/logs no CloudWatch.</text>
  <text class="label-light" x="156" y="900">A AWS fica como camada de persistencia, consulta e auditoria do resultado.</text>
</svg>
