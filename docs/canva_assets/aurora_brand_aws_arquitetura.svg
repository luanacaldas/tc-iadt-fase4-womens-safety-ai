<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-label="Arquitetura AWS Aurora Care AI na identidade visual Aurora">
  <defs>
    <marker id="arrow-red" markerWidth="20" markerHeight="20" refX="18" refY="10" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0 0 L20 10 L0 20 Z" fill="#DB4842"/>
    </marker>
    <marker id="arrow-coffee" markerWidth="20" markerHeight="20" refX="18" refY="10" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0 0 L20 10 L0 20 Z" fill="#1E1D1A"/>
    </marker>
    <style>
      .canvas{fill:#F4F1E8}.surface{fill:#F8F6EF}.raised{fill:#FFFCF4}.coffee{fill:#1E1D1A}.coffee2{fill:#26241F}.red{fill:#DB4842}.red2{fill:#BB3435}.tint{fill:#F4D8D6}.rule{stroke:#E3DED3;stroke-width:2}.rule-dark{stroke:#3A3631;stroke-width:2}
      .label{font-family:"Aptos Mono","IBM Plex Mono",Consolas,monospace;font-size:15px;font-weight:700;letter-spacing:3px;fill:#5C564B}
      .label-light{font-family:"Aptos Mono","IBM Plex Mono",Consolas,monospace;font-size:15px;font-weight:700;letter-spacing:3px;fill:#A29B8C}
      .title{font-family:Georgia,"Times New Roman",serif;font-size:54px;font-weight:700;fill:#1A1814}
      .section{font-family:Georgia,"Times New Roman",serif;font-size:32px;font-weight:700;fill:#1A1814}
      .section-light{font-family:Georgia,"Times New Roman",serif;font-size:32px;font-weight:700;fill:#ECE7D9}
      .h{font-family:Georgia,"Times New Roman",serif;font-size:28px;font-weight:700;fill:#1A1814}
      .body{font-family:Aptos,Arial,sans-serif;font-size:19px;fill:#5C564B}
      .body-light{font-family:Aptos,Arial,sans-serif;font-size:19px;fill:#A29B8C}
      .small{font-family:"Aptos Mono",Consolas,monospace;font-size:14px;fill:#8B867B}
      .arrow-red{stroke:#DB4842;stroke-width:5;fill:none;marker-end:url(#arrow-red)}
      .arrow-coffee{stroke:#1E1D1A;stroke-width:5;fill:none;marker-end:url(#arrow-coffee)}
    </style>
  </defs>
  <rect class="canvas" width="1920" height="1080"/>
  <rect class="red" x="0" y="0" width="1920" height="14"/>
  <text class="label" x="92" y="94">03 · ARQUITETURA AWS</text>
  <text class="title" x="92" y="172">Aurora Care AI: inferencia local</text>
  <text class="title" x="92" y="232">com persistencia serverless na AWS</text>
  <text class="body" x="92" y="278">O pipeline multimodal gera o RiskReport localmente; a AWS guarda, indexa e audita o resultado.</text>

  <rect class="surface rule" x="86" y="290" width="770" height="500"/>
  <text class="section" x="132" y="354">camada local de IA</text>
  <rect class="raised rule" x="132" y="420" width="220" height="142"/>
  <rect class="red" x="132" y="420" width="220" height="10"/>
  <text class="h" x="162" y="478">Entradas</text>
  <text class="body" x="162" y="516">texto | audio | video</text>
  <text class="body" x="162" y="544">imagem | clinico</text>

  <rect class="raised rule" x="438" y="420" width="272" height="142"/>
  <rect class="coffee" x="438" y="420" width="272" height="10"/>
  <text class="h" x="468" y="478">Extratores</text>
  <text class="body" x="468" y="516">NLP, audio, YOLOv8, pose</text>
  <text class="body" x="468" y="544">CTG e risco maternal</text>

  <rect class="raised rule" x="300" y="635" width="340" height="132"/>
  <rect class="red2" x="300" y="635" width="340" height="10"/>
  <text class="h" x="330" y="692">Fusion + Risk Engine</text>
  <text class="body" x="330" y="730">score, prioridade e revisao humana</text>
  <path class="arrow-red" d="M352 491 L438 491"/>
  <path class="arrow-coffee" d="M574 562 L574 600 L470 600 L470 635"/>
  <text class="small" x="132" y="744">saida: RiskReport JSON auditavel</text>

  <path class="arrow-red" d="M856 540 L990 540"/>
  <text class="small" x="884" y="510">upload seguro</text>

  <rect class="coffee" x="990" y="290" width="840" height="500"/>
  <text class="section-light" x="1036" y="354">camada AWS serverless</text>
  <rect class="raised" x="1036" y="420" width="244" height="150"/>
  <rect class="red" x="1036" y="420" width="244" height="10"/>
  <text class="h" x="1066" y="478">S3 reports</text>
  <text class="body" x="1066" y="516">results/{patient_id}/</text>
  <text class="body" x="1066" y="544">SSE-S3 + privado</text>

  <rect class="raised" x="1370" y="420" width="244" height="150"/>
  <rect class="red2" x="1370" y="420" width="244" height="10"/>
  <text class="h" x="1400" y="478">Lambda</text>
  <text class="body" x="1400" y="516">S3:ObjectCreated</text>
  <text class="body" x="1400" y="544">parse + metadados</text>

  <rect class="raised" x="1370" y="635" width="244" height="132"/>
  <rect class="coffee2" x="1370" y="635" width="244" height="10"/>
  <text class="h" x="1400" y="692">DynamoDB</text>
  <text class="body" x="1400" y="730">pk/sk, score e TTL</text>

  <rect class="raised" x="1036" y="635" width="244" height="132"/>
  <rect class="tint" x="1036" y="635" width="244" height="10"/>
  <text class="h" x="1066" y="692">CloudWatch</text>
  <text class="body" x="1066" y="730">logs e metricas</text>

  <path class="arrow-red" d="M1280 495 L1370 495"/>
  <path class="arrow-red" d="M1492 570 L1492 635"/>
  <path class="arrow-coffee" d="M1370 700 L1280 700"/>

  <rect class="surface rule" x="86" y="850" width="1744" height="112"/>
  <circle class="red" cx="132" cy="906" r="9"/>
  <text class="body" x="158" y="913">CloudFormation cria a stack reproduzivel</text>
  <circle class="coffee" cx="612" cy="906" r="9"/>
  <text class="body" x="638" y="913">S3 privado com criptografia server-side</text>
  <circle class="red2" cx="1118" cy="906" r="9"/>
  <text class="body" x="1144" y="913">Lambda indexa o JSON no DynamoDB</text>
  <circle class="tint" cx="1530" cy="906" r="9"/>
  <text class="body" x="1556" y="913">sem midia bruta na nuvem</text>
</svg>
