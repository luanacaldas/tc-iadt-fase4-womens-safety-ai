<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-label="Arquitetura AWS explicativa Aurora Care AI">
  <defs>
    <linearGradient id="hero" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#F8F3EA"/>
      <stop offset="100%" stop-color="#EEF7F4"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#12313F" flood-opacity="0.14"/>
    </filter>
    <marker id="arrowTeal" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L13,6.5 L0,13 Z" fill="#176B87"/>
    </marker>
    <marker id="arrowAmber" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L13,6.5 L0,13 Z" fill="#C47F2C"/>
    </marker>
    <style>
      .bg { fill: url(#hero); }
      .ink { fill: #102A35; }
      .muted { fill: #667085; }
      .panel { fill: #FFFFFF; stroke: #D7E3DF; stroke-width: 2; filter: url(#shadow); }
      .awsPanel { fill: #FAFFFD; stroke: #176B87; stroke-width: 3; filter: url(#shadow); }
      .mini { fill: #FFFFFF; stroke: #D8CCBB; stroke-width: 2; }
      .title { font-family: Aptos, Arial, sans-serif; font-size: 54px; font-weight: 800; fill: #102A35; }
      .subtitle { font-family: Aptos, Arial, sans-serif; font-size: 24px; fill: #52636B; }
      .section { font-family: Aptos, Arial, sans-serif; font-size: 28px; font-weight: 800; fill: #102A35; }
      .h { font-family: Aptos, Arial, sans-serif; font-size: 24px; font-weight: 800; fill: #102A35; }
      .body { font-family: Aptos, Arial, sans-serif; font-size: 18px; fill: #52636B; }
      .small { font-family: Aptos, Arial, sans-serif; font-size: 15px; fill: #667085; }
      .tag { font-family: Aptos, Arial, sans-serif; font-size: 14px; font-weight: 800; fill: #FFFFFF; letter-spacing: 1px; }
      .teal { fill: #176B87; }
      .amber { fill: #C47F2C; }
      .green { fill: #2E7D32; }
      .red { fill: #B42318; }
      .cream { fill: #FFF8EC; }
      .lineTeal { stroke: #176B87; stroke-width: 4; fill: none; marker-end: url(#arrowTeal); }
      .lineAmber { stroke: #C47F2C; stroke-width: 4; fill: none; marker-end: url(#arrowAmber); }
      .softLine { stroke: #A9BBB6; stroke-width: 2.5; fill: none; stroke-dasharray: 7 8; }
      .iconStroke { stroke: #176B87; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .iconAmber { stroke: #C47F2C; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .iconGreen { stroke: #2E7D32; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .iconWhite { stroke: #FFFFFF; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect class="bg" width="1920" height="1080"/>
  <rect class="teal" x="0" y="0" width="1920" height="14"/>

  <text class="title" x="86" y="105">Arquitetura AWS - Aurora Care AI</text>
  <text class="subtitle" x="88" y="146">Inferencia local de IA integrada a uma camada serverless na AWS para persistencia, indexacao, alerta e observabilidade.</text>

  <rect class="panel" x="86" y="205" width="455" height="690" rx="28"/>
  <text class="section" x="126" y="258">Ambiente local</text>
  <text class="body" x="126" y="291">A IA roda fora da cloud para controlar custo.</text>

  <rect class="mini" x="126" y="342" width="335" height="125" rx="18"/>
  <circle class="teal" cx="184" cy="404" r="34"/>
  <path class="iconWhite" d="M165 395 h38 a10 10 0 0 1 10 10 v14 h-58 v-14 a10 10 0 0 1 10-10z"/>
  <path class="iconWhite" d="M174 395 v-18 h20 v18"/>
  <text class="h" x="242" y="393">Pipeline multimodal</text>
  <text class="body" x="242" y="424">texto, audio, video e sinais</text>

  <rect class="mini" x="126" y="505" width="335" height="125" rx="18"/>
  <circle class="amber" cx="184" cy="567" r="34"/>
  <path class="iconWhite" d="M170 584 l14-38 14 38"/>
  <path class="iconWhite" d="M176 570 h16"/>
  <text class="h" x="242" y="556">Motor de risco</text>
  <text class="body" x="242" y="587">score, prioridade e revisao</text>

  <rect class="mini" x="126" y="668" width="335" height="125" rx="18"/>
  <circle class="green" cx="184" cy="730" r="34"/>
  <path class="iconWhite" d="M170 707 h23 l13 13 v33 h-36z"/>
  <path class="iconWhite" d="M193 707 v14 h13"/>
  <text class="h" x="242" y="719">RiskReport JSON</text>
  <text class="body" x="242" y="750">resultado auditavel</text>

  <path class="lineTeal" d="M461 731 C560 731 565 542 650 542"/>
  <text class="small" x="530" y="676">upload seguro do JSON</text>

  <rect class="awsPanel" x="650" y="205" width="1184" height="690" rx="32"/>
  <text class="section" x="695" y="258">AWS us-east-1</text>
  <text class="body" x="695" y="291">Conta 219834006479 | stack CloudFormation aurora-care-ai-free-tier</text>

  <rect class="mini" x="708" y="350" width="255" height="145" rx="20"/>
  <circle class="teal" cx="758" cy="405" r="30"/>
  <path class="iconWhite" d="M737 398 h42 l-7 35 h-28z"/>
  <path class="iconWhite" d="M742 398 l6-15 h20 l6 15"/>
  <text class="h" x="808" y="393">Amazon S3</text>
  <text class="body" x="808" y="424">bucket privado</text>
  <text class="small" x="808" y="451">SSE-S3 | Block Public Access</text>

  <rect class="mini" x="1035" y="350" width="255" height="145" rx="20"/>
  <circle class="amber" cx="1085" cy="405" r="30"/>
  <path class="iconWhite" d="M1072 386 l25 19 -25 19"/>
  <path class="iconWhite" d="M1097 386 l-25 19 25 19"/>
  <text class="h" x="1135" y="393">AWS Lambda</text>
  <text class="body" x="1135" y="424">report-indexer</text>
  <text class="small" x="1135" y="451">ObjectCreated -> parse JSON</text>

  <rect class="mini" x="1362" y="350" width="255" height="145" rx="20"/>
  <circle class="green" cx="1412" cy="405" r="30"/>
  <ellipse class="iconWhite" cx="1412" cy="390" rx="20" ry="8"/>
  <path class="iconWhite" d="M1392 390 v30 c0 5 9 9 20 9s20-4 20-9v-30"/>
  <path class="iconWhite" d="M1392 405 c0 5 9 9 20 9s20-4 20-9"/>
  <text class="h" x="1462" y="393">DynamoDB</text>
  <text class="body" x="1462" y="424">indice historico</text>
  <text class="small" x="1462" y="451">pk=PATIENT#{id} | TTL</text>

  <path class="lineTeal" d="M963 423 H1035"/>
  <path class="lineTeal" d="M1290 423 H1362"/>

  <rect class="mini" x="872" y="610" width="255" height="145" rx="20"/>
  <circle class="teal" cx="922" cy="665" r="30"/>
  <path class="iconWhite" d="M902 652 h40 v28 h-40z"/>
  <path class="iconWhite" d="M902 652 l20 16 20-16"/>
  <text class="h" x="972" y="653">Amazon SNS</text>
  <text class="body" x="972" y="684">alerta por email</text>
  <text class="small" x="972" y="711">risco alto ou urgente</text>

  <rect class="mini" x="1199" y="610" width="255" height="145" rx="20"/>
  <circle class="amber" cx="1249" cy="665" r="30"/>
  <path class="iconWhite" d="M1230 681 v-32"/>
  <path class="iconWhite" d="M1249 681 v-45"/>
  <path class="iconWhite" d="M1268 681 v-22"/>
  <path class="iconWhite" d="M1228 683 h43"/>
  <text class="h" x="1299" y="653">CloudWatch</text>
  <text class="body" x="1299" y="684">logs e metricas</text>
  <text class="small" x="1299" y="711">invocations | errors | duration</text>

  <path class="lineAmber" d="M1162 495 C1162 555 1010 555 1010 610"/>
  <path class="lineAmber" d="M1162 495 C1162 555 1326 555 1326 610"/>

  <rect class="mini" x="708" y="795" width="280" height="66" rx="18"/>
  <path class="iconStroke" d="M736 825 h42 m-34-14 h34 m-26 28 h26"/>
  <text class="body" x="800" y="835">CloudFormation provisiona</text>

  <rect class="mini" x="1028" y="795" width="280" height="66" rx="18"/>
  <path class="iconAmber" d="M1060 839 v-30 h30 v30"/>
  <path class="iconAmber" d="M1054 839 h42"/>
  <text class="body" x="1120" y="835">IAM least privilege</text>

  <rect class="mini" x="1348" y="795" width="280" height="66" rx="18"/>
  <path class="iconGreen" d="M1380 842 c22-15 22-48 0-48 c-22 0-22 33 0 48z"/>
  <path class="iconGreen" d="M1380 806 v24"/>
  <path class="iconGreen" d="M1370 817 h20"/>
  <text class="body" x="1420" y="835">Budget controla custo</text>

  <rect x="86" y="940" width="1748" height="72" rx="20" fill="#102A35"/>
  <text class="tag" x="126" y="983">DECISAO DE ARQUITETURA</text>
  <text class="body" x="356" y="983" fill="#E8F2EF">A cloud recebe apenas o resultado JSON: menos custo, menor exposicao de dados e integracao real com S3, Lambda, DynamoDB, SNS e CloudWatch.</text>
</svg>
