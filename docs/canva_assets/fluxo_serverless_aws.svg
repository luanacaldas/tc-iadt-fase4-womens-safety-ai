<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-label="Fluxo serverless AWS Aurora Care AI">
  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#176B87"/>
    </marker>
    <style>
      .bg{fill:#F7F2EA}.teal{fill:#176B87}.amber{fill:#C47F2C}.green{fill:#2E7D32}.dark{fill:#101827}
      .box{fill:#FFFFFF;stroke:#D8CCBB;stroke-width:2}.title{font-family:Georgia,serif;font-size:54px;font-weight:700;fill:#111827}
      .h{font-family:Georgia,serif;font-size:30px;font-weight:700;fill:#111827}.body{font-family:Aptos,Arial,sans-serif;font-size:20px;fill:#667085}
      .label{font-family:Aptos,Arial,sans-serif;font-size:15px;font-weight:700;fill:#667085;letter-spacing:2px}
      .arrow{stroke:#176B87;stroke-width:5;fill:none;marker-end:url(#arrow)}
      .arrow2{stroke:#C47F2C;stroke-width:5;fill:none;marker-end:url(#arrow)}
      .arrow3{stroke:#2E7D32;stroke-width:5;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1920" height="1080"/>
  <rect class="teal" width="1920" height="14"/>
  <text class="label" x="96" y="108">AURORA CARE AI | FLUXO AWS VALIDADO</text>
  <text class="title" x="96" y="188">S3 aciona Lambda, que indexa o resultado da IA no DynamoDB</text>

  <rect class="box" x="120" y="390" width="270" height="170"/>
  <rect class="teal" x="120" y="390" width="270" height="10"/>
  <text class="h" x="150" y="455">RiskReport JSON</text>
  <text class="body" x="150" y="500">gerado pelo pipeline</text>
  <text class="body" x="150" y="528">multimodal local</text>

  <rect class="box" x="500" y="390" width="270" height="170"/>
  <rect class="teal" x="500" y="390" width="270" height="10"/>
  <text class="h" x="530" y="455">S3 Bucket</text>
  <text class="body" x="530" y="500">results/demo-001/</text>
  <text class="body" x="530" y="528">SSE-S3 + privado</text>

  <rect class="box" x="880" y="390" width="270" height="170"/>
  <rect class="amber" x="880" y="390" width="270" height="10"/>
  <text class="h" x="910" y="455">Lambda</text>
  <text class="body" x="910" y="500">report-indexer</text>
  <text class="body" x="910" y="528">parse + metadados</text>

  <rect class="box" x="1260" y="270" width="270" height="170"/>
  <rect class="green" x="1260" y="270" width="270" height="10"/>
  <text class="h" x="1290" y="335">DynamoDB</text>
  <text class="body" x="1290" y="380">pk/sk + score + s3_key</text>
  <text class="body" x="1290" y="408">TTL para retenção</text>

  <rect class="box" x="1260" y="520" width="270" height="170"/>
  <rect class="amber" x="1260" y="520" width="270" height="10"/>
  <text class="h" x="1290" y="585">CloudWatch</text>
  <text class="body" x="1290" y="630">START / END / REPORT</text>
  <text class="body" x="1290" y="658">métricas de execução</text>

  <path class="arrow" d="M390 475 L500 475"/>
  <path class="arrow" d="M770 475 L880 475"/>
  <path class="arrow3" d="M1150 450 L1260 355"/>
  <path class="arrow2" d="M1150 500 L1260 605"/>

  <text class="label" x="420" y="445">UPLOAD</text>
  <text class="label" x="792" y="445">S3:ObjectCreated</text>
  <text class="label" x="1188" y="402">PutItem</text>
  <text class="label" x="1188" y="578">Logs</text>

  <rect class="dark" x="120" y="780" width="1410" height="92"/>
  <text x="156" y="836" style="font-family:Aptos,Arial,sans-serif;font-size:24px;font-weight:700;fill:#FFFFFF">Evidência observada: objeto no S3 + item no DynamoDB + invocações e logs no CloudWatch.</text>
</svg>
