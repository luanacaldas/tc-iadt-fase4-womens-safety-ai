<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-label="Arquitetura completa Aurora Care AI com integração AWS">
  <defs>
    <marker id="arrow-teal" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#176B87"/>
    </marker>
    <marker id="arrow-amber" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#C47F2C"/>
    </marker>
    <marker id="arrow-green" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#2E7D32"/>
    </marker>
    <style>
      .bg { fill: #F7F2EA; }
      .ink { fill: #111827; }
      .muted { fill: #667085; }
      .panel { fill: #FFFDF8; stroke: #D8CCBB; stroke-width: 2; }
      .dark { fill: #101827; }
      .box { fill: #FFFFFF; stroke: #D8CCBB; stroke-width: 2; }
      .box-dark { fill: #FFFFFF; stroke: #D8CCBB; stroke-width: 2; }
      .title { font-family: Georgia, serif; font-size: 48px; font-weight: 700; fill: #111827; }
      .section { font-family: Georgia, serif; font-size: 30px; font-weight: 700; fill: #111827; }
      .section-white { font-family: Georgia, serif; font-size: 30px; font-weight: 700; fill: #FFFFFF; }
      .h { font-family: Georgia, serif; font-size: 26px; font-weight: 700; fill: #111827; }
      .body { font-family: Aptos, Arial, sans-serif; font-size: 18px; fill: #667085; }
      .small { font-family: Aptos, Arial, sans-serif; font-size: 15px; fill: #667085; }
      .mono { font-family: Consolas, monospace; font-size: 16px; fill: #667085; }
      .label { font-family: Aptos, Arial, sans-serif; font-size: 14px; font-weight: 700; fill: #667085; letter-spacing: 2px; }
      .arrow-teal { stroke: #176B87; stroke-width: 4; fill: none; marker-end: url(#arrow-teal); }
      .arrow-amber { stroke: #C47F2C; stroke-width: 4; fill: none; marker-end: url(#arrow-amber); }
      .arrow-green { stroke: #2E7D32; stroke-width: 4; fill: none; marker-end: url(#arrow-green); }
      .teal { fill: #176B87; }
      .amber { fill: #C47F2C; }
      .green { fill: #2E7D32; }
      .red { fill: #B42318; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1920" height="1080"/>
  <rect class="teal" x="0" y="0" width="1920" height="14"/>
  <rect class="teal" x="76" y="80" width="12" height="58"/>
  <text class="label" x="110" y="96">AURORA CARE AI | ARQUITETURA COMPLETA</text>
  <text class="title" x="76" y="180">Inferência local + integração AWS serverless para persistência e auditoria</text>

  <rect class="panel" x="70" y="250" width="770" height="560"/>
  <text class="section" x="112" y="305">Camada local de IA multimodal</text>

  <rect class="box" x="112" y="360" width="210" height="130"/>
  <rect class="teal" x="112" y="360" width="210" height="8"/>
  <text class="h" x="138" y="410">Entradas</text>
  <text class="body" x="138" y="446">texto | áudio | vídeo</text>
  <text class="body" x="138" y="472">imagem | clínico</text>

  <rect class="box" x="390" y="360" width="260" height="130"/>
  <rect class="amber" x="390" y="360" width="260" height="8"/>
  <text class="h" x="416" y="410">Extratores</text>
  <text class="body" x="416" y="446">NLP léxico, áudio, YOLOv8,</text>
  <text class="body" x="416" y="472">pose, CTG/Maternal</text>

  <rect class="box" x="260" y="580" width="320" height="130"/>
  <rect class="green" x="260" y="580" width="320" height="8"/>
  <text class="h" x="286" y="630">Fusion + Risk Engine</text>
  <text class="body" x="286" y="666">score multimodal, prioridade,</text>
  <text class="body" x="286" y="692">trilha de cuidado e revisão humana</text>

  <path class="arrow-teal" d="M 322 425 L 390 425"/>
  <path class="arrow-green" d="M 520 490 L 520 550 L 420 550 L 420 580"/>
  <text class="mono" x="112" y="760">Saída: RiskReport JSON auditável</text>

  <path class="arrow-teal" d="M 840 535 L 940 535"/>
  <text class="small" x="852" y="500">upload JSON</text>

  <rect class="dark" x="940" y="250" width="840" height="560"/>
  <text class="section-white" x="982" y="305">Camada AWS serverless</text>

  <rect class="box-dark" x="982" y="360" width="230" height="145"/>
  <rect class="teal" x="982" y="360" width="230" height="8"/>
  <text class="h" x="1010" y="410">S3 reports</text>
  <text class="body" x="1010" y="446">results/{patient_id}/</text>
  <text class="body" x="1010" y="472">SSE-S3 + Block Public Access</text>

  <rect class="box-dark" x="1290" y="360" width="230" height="145"/>
  <rect class="amber" x="1290" y="360" width="230" height="8"/>
  <text class="h" x="1318" y="410">Lambda indexer</text>
  <text class="body" x="1318" y="446">S3:ObjectCreated</text>
  <text class="body" x="1318" y="472">parse JSON + metadados</text>

  <rect class="box-dark" x="1290" y="610" width="230" height="145"/>
  <rect class="green" x="1290" y="610" width="230" height="8"/>
  <text class="h" x="1318" y="660">DynamoDB</text>
  <text class="body" x="1318" y="696">pk=PATIENT#{id}</text>
  <text class="body" x="1318" y="722">sk=TS#{timestamp} | TTL</text>

  <rect class="box-dark" x="982" y="610" width="230" height="145"/>
  <rect class="muted" x="982" y="610" width="230" height="8" fill="#8A7563"/>
  <text class="h" x="1010" y="660">SNS</text>
  <text class="body" x="1010" y="696">alerta email</text>
  <text class="body" x="1010" y="722">quando confirmado</text>

  <path class="arrow-amber" d="M 1212 432 L 1290 432"/>
  <path class="arrow-green" d="M 1405 505 L 1405 610"/>
  <path class="arrow-teal" d="M 1290 682 L 1212 682"/>

  <rect class="panel" x="70" y="870" width="1710" height="105"/>
  <circle class="teal" cx="116" cy="922" r="8"/>
  <text class="body" x="136" y="928">CloudWatch: logs, métricas e troubleshooting da Lambda</text>
  <circle class="amber" cx="642" cy="922" r="8"/>
  <text class="body" x="662" y="928">CloudFormation: stack reprodutível</text>
  <circle class="green" cx="1032" cy="922" r="8"/>
  <text class="body" x="1052" y="928">Budget: controle de custo antes de escalar</text>
  <circle class="red" cx="1418" cy="922" r="8"/>
  <text class="body" x="1438" y="928">LGPD: sem mídia bruta persistida na nuvem</text>
</svg>
