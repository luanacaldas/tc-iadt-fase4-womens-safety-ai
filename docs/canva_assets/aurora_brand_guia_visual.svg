<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-label="Guia visual Aurora com cores e tipografia">
  <defs>
    <style>
      .canvas{fill:#F4F1E8}.surface{fill:#F8F6EF}.raised{fill:#FFFCF4}.rule{stroke:#E3DED3;stroke-width:2}.coffee{fill:#1E1D1A}.red{fill:#DB4842}.red2{fill:#BB3435}.tint{fill:#F4D8D6}
      .label{font-family:"Aptos Mono","IBM Plex Mono",Consolas,monospace;font-size:15px;font-weight:700;letter-spacing:3px;fill:#5C564B}
      .mono{font-family:"Aptos Mono","IBM Plex Mono",Consolas,monospace;font-size:18px;letter-spacing:2px;fill:#5C564B}
      .title{font-family:Georgia,"Times New Roman",serif;font-size:74px;font-weight:700;fill:#1A1814}
      .serif{font-family:Georgia,"Times New Roman",serif;font-size:42px;font-weight:700;fill:#1A1814}
      .body{font-family:Aptos,Arial,sans-serif;font-size:22px;fill:#5C564B}
      .small{font-family:Aptos,Arial,sans-serif;font-size:18px;fill:#5C564B}
      .swatch-label{font-family:"Aptos Mono",Consolas,monospace;font-size:15px;font-weight:700;letter-spacing:1px;fill:#5C564B}
      .hex-light{font-family:Georgia,"Times New Roman",serif;font-size:34px;font-weight:700;fill:#FFFCF4}
      .hex-dark{font-family:Georgia,"Times New Roman",serif;font-size:34px;font-weight:700;fill:#1A1814}
    </style>
  </defs>
  <rect class="canvas" width="1920" height="1080"/>
  <rect class="red" width="1920" height="14"/>
  <text class="label" x="96" y="102">AURORA CARE AI · GUIA VISUAL</text>
  <text class="title" x="96" y="192">cores e tipografia usadas na Aurora</text>
  <text class="body" x="96" y="240">Base inspirada no sistema paper / coffee / brand red: quieta, tecnica e humana.</text>

  <text class="label" x="96" y="338">PALETA PRINCIPAL</text>
  <rect class="red" x="96" y="374" width="345" height="190"/>
  <text class="hex-light" x="126" y="496">#DB4842</text>
  <text class="swatch-label" x="126" y="536" fill="#FFFCF4">brand red</text>

  <rect class="coffee" x="472" y="374" width="345" height="190"/>
  <text class="hex-light" x="502" y="496">#1E1D1A</text>
  <text class="swatch-label" x="502" y="536" fill="#FFFCF4">coffee / ink</text>

  <rect class="surface rule" x="848" y="374" width="345" height="190"/>
  <text class="hex-dark" x="878" y="496">#F8F6EF</text>
  <text class="swatch-label" x="878" y="536">surface</text>

  <rect class="raised rule" x="1224" y="374" width="345" height="190"/>
  <text class="hex-dark" x="1254" y="496">#FFFCF4</text>
  <text class="swatch-label" x="1254" y="536">raised paper</text>

  <text class="label" x="96" y="642">CORES DE APOIO</text>
  <rect class="red2" x="96" y="680" width="235" height="110"/>
  <text class="swatch-label" x="118" y="744" fill="#FFFCF4">#BB3435</text>
  <text class="small" x="96" y="825">red pressed</text>

  <rect class="tint rule" x="360" y="680" width="235" height="110"/>
  <text class="swatch-label" x="382" y="744">#F4D8D6</text>
  <text class="small" x="360" y="825">red tint</text>

  <rect x="624" y="680" width="235" height="110" fill="#5C564B"/>
  <text class="swatch-label" x="646" y="744" fill="#FFFCF4">#5C564B</text>
  <text class="small" x="624" y="825">ink dim</text>

  <rect x="888" y="680" width="235" height="110" fill="#E3DED3"/>
  <text class="swatch-label" x="910" y="744">#E3DED3</text>
  <text class="small" x="888" y="825">rule</text>

  <rect class="surface rule" x="1224" y="642" width="600" height="246"/>
  <text class="label" x="1260" y="692">TIPOGRAFIA</text>
  <text class="serif" x="1260" y="762">Georgia para titulos e claims</text>
  <text class="body" x="1260" y="810">Aptos / Arial para leitura curta, tabelas e descricoes.</text>
  <text class="mono" x="1260" y="858">APTOS MONO · ROTULOS TECNICOS · 03</text>
</svg>
